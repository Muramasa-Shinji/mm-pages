<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { font-family: 'Inter', sans-serif; background: #ffffff; overflow: hidden; }

  .seccion { padding: 8px 0 12px 0; }

  .titulo-seccion {
    display: inline-block;
    font-size: 0.7em;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #1a1a1a;
    background: #FFD700;
    padding: 4px 12px;
    margin-bottom: 12px;
  }

  /* BASE: cubre móvil angosto Y columna de desktop (~430px) */
  .cards { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

  .card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-left: 4px solid #FFD700;
    background: #fafafa;
    border-radius: 0 6px 6px 0;
  }

  .icono { font-size: 1.3em; flex-shrink: 0; }

  .card-texto h3 { font-size: 0.88em; font-weight: 700; color: #1a1a1a; margin-bottom: 2px; }
  .card-texto p  { font-size: 0.78em; color: #555; line-height: 1.4; }

  .foto-wrapper { width: 100%; border-radius: 8px; overflow: hidden; }
  .foto-wrapper img {
    width: 100%; height: 200px;
    object-fit: cover; object-position: center;
    display: block; border-radius: 8px;
  }

  /* Pantallas muy anchas 700px+ */
  @media (min-width: 700px) {
    .cards { gap: 12px; margin-bottom: 18px; }
    .card { padding: 12px 16px; gap: 14px; align-items: flex-start; }
    .icono { font-size: 1.6em; margin-top: 2px; }
    .card-texto h3 { font-size: 0.95em; }
    .card-texto p  { font-size: 0.83em; line-height: 1.5; }
    .foto-wrapper img { height: 510px; }
  }
</style>
</head>
<body>
  <div class="seccion">
    <div class="titulo-seccion">Beneficios</div>
    <div class="cards">
      <div class="card">
        <div class="icono">📍</div>
        <div class="card-texto">
          <h3>Profesionales locales</h3>
          <p>Conocemos CDMX y sus rutas, garantizando tiempos y seguridad.</p>
        </div>
      </div>
      <div class="card">
        <div class="icono">🤝</div>
        <div class="card-texto">
          <h3>Atención personalizada</h3>
          <p>Tratamos tus pertenencias como si fueran nuestras.</p>
        </div>
      </div>
      <div class="card">
        <div class="icono">⭐</div>
        <div class="card-texto">
          <h3>Respaldo real</h3>
          <p>Nuestros clientes nos recomiendan con un 100% de satisfacción.</p>
        </div>
      </div>
    </div>
    <div class="foto-wrapper">
      <img src="foto-equipo.jpg" alt="Equipo de Mudanzas Pao en trabajo"
           onerror="this.parentElement.style.display='none'">
    </div>
  </div>
</body>
</html>
