<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medios de pago — Alarcón</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold-flat:  #c8973a;
    --gold-grad:  linear-gradient(115deg, #a0621a 0%, #e8b84b 40%, #f5d98a 60%, #c8973a 100%);
    --dark:       #1a1a1a;
    --text-dark:  #1a1a1a;
    --text-muted: #555;
    --bg:         #fafafa;
    --border:     #e8e0d0;
  }
  html, body {
    width: 100%; height: 180px;
    overflow: hidden;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }

  .section {
    width: 100%; height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px;
  }

  /* ── LABEL ── */
  .eyebrow {
    font-size: .65rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--gold-flat);
    font-weight: 500;
  }

  /* ── CARD ── */
  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 24px;
    position: relative;
    overflow: hidden;
    width: 100%;
    max-width: 360px;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gold-grad);
    border-radius: 6px 6px 0 0;
  }

  .icon-wrap {
    width: 40px; height: 40px;
    flex-shrink: 0;
    background: var(--gold-grad);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .card-body { display: flex; flex-direction: column; gap: 2px; }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-dark);
    line-height: 1.1;
  }

  .card-sub {
    font-size: .72rem;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* Animation */
  .eyebrow { opacity:0; animation: up .45s ease .05s forwards; }
  .card    { opacity:0; animation: up .5s ease .15s forwards; }
  @keyframes up { to { opacity:1; transform:none; } }
</style>
</head>
<body>
<div class="section">
  <span class="eyebrow">Medios de pago aceptados</span>
  <div class="card">
    <div class="icon-wrap">
      <!-- Cash / bills icon -->
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0e0e0e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="20" height="12" rx="2"/>
        <circle cx="12" cy="12" r="2"/>
        <path d="M6 12h.01M18 12h.01"/>
      </svg>
    </div>
    <div class="card-body">
      <span class="card-title">Efectivo</span>
      <span class="card-sub">Único medio de pago aceptado</span>
    </div>
  </div>
</div>
</body>
</html>
