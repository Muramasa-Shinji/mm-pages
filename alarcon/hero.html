<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mudanzas Alarcón — Hero</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold-flat:    #c8973a;
    --gold-grad:    linear-gradient(115deg, #a0621a 0%, #e8b84b 40%, #f5d98a 60%, #c8973a 100%);
    --gold-grad-h:  linear-gradient(115deg, #b8721a 0%, #f0c050 40%, #ffe090 60%, #d4a030 100%);
    --dark:         #0e0e0e;
    --dark-2:       #171717;
    --dark-3:       #222;
    --text-light:   #e8e0d0;
    --text-muted:   #999;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--dark);
    font-family: 'DM Sans', sans-serif;
  }

  /* ── HERO WRAPPER ── */
  .hero {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px 24px 40px;
    overflow: hidden;
    background: var(--dark);
  }

  /* Radial glow background */
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 55% at 50% 0%,   rgba(200,151,58,.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 85% 90%,  rgba(200,151,58,.10) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Decorative diagonal line */
  .hero::after {
    content: '';
    position: absolute;
    top: 0; left: -10%;
    width: 55%; height: 3px;
    background: var(--gold-grad);
    transform: rotate(35deg) translateY(120px);
    opacity: .35;
    pointer-events: none;
  }

  /* ── BADGE ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 18px;
    border: 1px solid rgba(200,151,58,.35);
    border-radius: 50px;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }
  .badge-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold-grad);
    flex-shrink: 0;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: .5; transform: scale(1.4); }
  }
  .badge-text {
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 400;
  }

  /* ── HEADING ── */
  .heading {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: clamp(2.6rem, 8vw, 5rem);
    line-height: 1.08;
    text-align: center;
    color: var(--text-light);
    position: relative;
    z-index: 1;
    margin-bottom: 16px;
    letter-spacing: -.01em;
  }
  .heading .gold-word {
    background: var(--gold-grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: inline-block;
  }

  /* ── SUB ── */
  .sub {
    font-size: clamp(.85rem, 2.5vw, 1rem);
    color: var(--text-muted);
    text-align: center;
    max-width: 360px;
    line-height: 1.65;
    position: relative;
    z-index: 1;
    margin-bottom: 40px;
    font-weight: 300;
  }

  /* ── CTA ── */
  .cta-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index: 1;
    margin-bottom: 52px;
  }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 32px;
    background: var(--gold-grad);
    color: #0e0e0e;
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    font-weight: 500;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: .04em;
    transition: opacity .2s, transform .2s;
  }
  .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
  .btn-primary svg { flex-shrink: 0; }

  .btn-secondary {
    font-size: .8rem;
    color: var(--gold-flat);
    text-decoration: none;
    letter-spacing: .06em;
    text-transform: uppercase;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    opacity: .75;
    transition: opacity .2s;
  }
  .btn-secondary:hover { opacity: 1; }

  /* ── STATS ROW ── */
  .stats {
    display: flex;
    gap: 0;
    border-top: 1px solid rgba(255,255,255,.08);
    padding-top: 28px;
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 1;
  }
  .stat {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 0 16px;
  }
  .stat + .stat {
    border-left: 1px solid rgba(255,255,255,.08);
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.9rem;
    font-weight: 700;
    background: var(--gold-grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .stat-label {
    font-size: .68rem;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: .06em;
    text-transform: uppercase;
    line-height: 1.3;
  }

  /* ── CORNER DECO ── */
  .corner-deco {
    position: absolute;
    bottom: 24px;
    right: 24px;
    width: 48px; height: 48px;
    border-right: 2px solid rgba(200,151,58,.3);
    border-bottom: 2px solid rgba(200,151,58,.3);
    border-radius: 0 0 4px 0;
  }
  .corner-deco-tl {
    position: absolute;
    top: 24px;
    left: 24px;
    width: 48px; height: 48px;
    border-left: 2px solid rgba(200,151,58,.3);
    border-top: 2px solid rgba(200,151,58,.3);
    border-radius: 4px 0 0 0;
  }

  /* ── ENTRY ANIMATIONS ── */
  .badge, .heading, .sub, .cta-wrap, .stats {
    opacity: 0;
    transform: translateY(18px);
    animation: fadeUp .7s ease forwards;
  }
  .heading  { animation-delay: .12s; }
  .sub      { animation-delay: .22s; }
  .cta-wrap { animation-delay: .32s; }
  .stats    { animation-delay: .44s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: none; }
  }
</style>
</head>
<body>
<section class="hero">
  <div class="corner-deco-tl"></div>
  <div class="corner-deco"></div>

  <div class="badge">
    <span class="badge-dot"></span>
    <span class="badge-text">Empresa de confianza · CDMX</span>
  </div>

  <h1 class="heading">
    Mudanzas<br>
    <span class="gold-word">Alarcón</span>
  </h1>

  <p class="sub">
    Tu mudanza, en manos expertas. Servicio profesional, puntual y con el cuidado que mereces.
  </p>

  <div class="cta-wrap">
    <a href="#cotizar" class="btn-primary">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Cotiza tu mudanza gratis
    </a>
    <a href="#servicios" class="btn-secondary">
      Ver servicios
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-num">10+</span>
      <span class="stat-label">Años de experiencia</span>
    </div>
    <div class="stat">
      <span class="stat-num">500+</span>
      <span class="stat-label">Mudanzas realizadas</span>
    </div>
    <div class="stat">
      <span class="stat-num">100%</span>
      <span class="stat-label">Compromiso de entrega</span>
    </div>
  </div>
</section>
</body>
</html>
