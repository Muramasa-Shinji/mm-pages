<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mudanzas Alarcón — Hero</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold-flat:  #c8973a;
    --gold-grad:  linear-gradient(115deg, #a0621a 0%, #e8b84b 40%, #f5d98a 60%, #c8973a 100%);
    --text-light: #e8e0d0;
    --text-muted: #999;
  }
  html, body {
    width: 100%; height: 300px;
    overflow: hidden;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    width: 100%; height: 300px;
    display: flex;
    flex-direction: row;          /* horizontal */
    align-items: center;
    padding: 20px 28px;
    overflow: hidden;
    background:
      linear-gradient(rgba(14,14,14,0.78), rgba(14,14,14,0.78)),
      url('https://muramasa-shinji.github.io/mm-pages/alarcon/hero.jpg') center center / cover no-repeat;
  }

  /* Radial glow solo arriba */
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 60% at 30% 50%, rgba(200,151,58,.14) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── COLUMNA IZQUIERDA ── */
  .col-left {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
    position: relative; z-index: 1;
    padding-right: 32px;
  }

  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 14px;
    border: 1px solid rgba(200,151,58,.35);
    border-radius: 50px;
  }
  .badge-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold-grad); flex-shrink: 0;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.5; transform:scale(1.4); }
  }
  .badge-text { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); }

  .heading {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: clamp(2.2rem, 5vw, 3.4rem);
    line-height: 1.05;
    color: var(--text-light);
  }
  .heading .gold-word {
    background: var(--gold-grad);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; display: inline-block;
  }

  .sub {
    font-size: .82rem; color: var(--text-muted);
    line-height: 1.55; font-weight: 300;
    max-width: 260px;
  }



  /* ── DIVISOR VERTICAL ── */
  .divider-v {
    width: 1px;
    height: 150px;
    background: rgba(255,255,255,.1);
    flex-shrink: 0;
    position: relative; z-index: 1;
  }

  /* ── COLUMNA DERECHA — STATS ── */
  .col-right {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding-left: 36px;
    position: relative; z-index: 1;
  }

  .stat {
    display: flex; flex-direction: column;
    align-items: center; gap: 2px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.7rem; font-weight: 700;
    background: var(--gold-grad);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; line-height: 1;
  }
  .stat-label {
    font-size: .6rem; color: var(--text-muted);
    letter-spacing: .06em; text-transform: uppercase; line-height: 1.3;
  }

  .stat-sep {
    width: 30px; height: 1px;
    background: rgba(200,151,58,.25);
  }

  /* ── CORNER DECOS ── */
  .corner { position: absolute; width: 32px; height: 32px; }
  .corner-tl { top:16px; left:16px; border-top:1px solid rgba(200,151,58,.3); border-left:1px solid rgba(200,151,58,.3); border-radius:3px 0 0 0; }
  .corner-br { bottom:16px; right:16px; border-bottom:1px solid rgba(200,151,58,.3); border-right:1px solid rgba(200,151,58,.3); border-radius:0 0 3px 0; }

  /* ── ANIMATIONS ── */
  .col-left  { opacity:0; transform:translateX(-12px); animation: slideR .6s ease .05s forwards; }
  .col-right { opacity:0; transform:translateX(12px);  animation: slideL .6s ease .15s forwards; }
  @keyframes slideR { to { opacity:1; transform:none; } }
  @keyframes slideL { to { opacity:1; transform:none; } }
</style>
</head>
<body>
<section class="hero">
  <div class="corner corner-tl"></div>
  <div class="corner corner-br"></div>

  <!-- IZQUIERDA -->
  <div class="col-left">
    <div class="badge">
      <span class="badge-dot"></span>
      <span class="badge-text">Empresa de confianza · CDMX</span>
    </div>
    <h1 class="heading">Mudanzas<br><span class="gold-word">Alarcón</span></h1>
    <p class="sub">Tu mudanza, en manos expertas. Servicio profesional, puntual y con el cuidado que mereces.</p>
    </div>

  <!-- DIVISOR -->
  <div class="divider-v"></div>

  <!-- DERECHA -->
  <div class="col-right">
    <div class="stat">
      <span class="stat-num">10+</span>
      <span class="stat-label">Años de<br>experiencia</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <span class="stat-num">500+</span>
      <span class="stat-label">Mudanzas<br>realizadas</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <span class="stat-num">100%</span>
      <span class="stat-label">Compromiso<br>de entrega</span>
    </div>
  </div>

</section>
</body>
</html>
