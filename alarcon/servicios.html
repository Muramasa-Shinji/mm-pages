<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mudanzas Residenciales — Alarcón</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold-flat:  #c8973a;
    --gold-grad:  linear-gradient(115deg, #a0621a 0%, #e8b84b 40%, #f5d98a 60%, #c8973a 100%);
    --dark:       #0e0e0e;
    --text-dark:  #1a1a1a;
    --text-muted: #555;
    --bg:         #fafafa;
    --border:     #e8e0d0;
  }
  html, body {
    width: 100%; height: 460px;
    overflow: hidden;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .card {
    width: 100%; height: 460px;
    background: var(--bg);
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 28px 24px 24px;
  }
  /* Gold top border */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--gold-grad);
    border-radius: 6px 6px 0 0;
  }
  /* Background glow */
  .card::after {
    content: '';
    position: absolute;
    bottom: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,151,58,.07) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── HEADER ── */
  .card-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .icon-wrap {
    width: 44px; height: 44px;
    flex-shrink: 0;
    background: var(--gold-grad);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .card-titles { display: flex; flex-direction: column; gap: 2px; }
  .card-label {
    font-size: .65rem; letter-spacing: .12em;
    text-transform: uppercase; color: var(--gold-flat); font-weight: 500;
  }
  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.25rem, 4vw, 1.5rem);
    font-weight: 700; color: var(--text-dark); line-height: 1.1;
  }

  /* ── DESCRIPTION ── */
  .card-desc {
    font-size: .82rem; color: var(--text-muted);
    line-height: 1.6; margin-bottom: 18px;
    font-weight: 300;
  }

  /* ── FEATURES — 2-col grid, nunca se rompen en una sola columna ── */
  .features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }
  .feat {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 12px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 50px;
    font-size: .74rem; color: var(--text-dark); font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
  }
  .feat .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold-grad); flex-shrink: 0;
  }
  /* Destacado: personal capacitado — ocupa las 2 columnas */
  .feat.highlight {
    grid-column: 1 / -1;
    background: var(--gold-grad);
    border-color: transparent;
    color: #0e0e0e; font-weight: 500;
    justify-content: center;
  }
  .feat.highlight .dot { background: rgba(0,0,0,.3); }

  /* ── FOOTER ── */
  .card-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .footer-note { font-size: .7rem; color: var(--text-muted); font-weight: 300; }
  .btn-quote {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 18px;
    background: var(--dark); color: #e8e0d0;
    font-family: 'DM Sans', sans-serif;
    font-size: .76rem; font-weight: 500;
    border-radius: 4px; text-decoration: none;
    letter-spacing: .03em; white-space: nowrap;
    transition: opacity .2s;
    flex-shrink: 0;
  }
  .btn-quote:hover { opacity: .8; }

  /* Entry animation */
  .card { opacity: 0; transform: translateY(10px); animation: fadeUp .55s ease .05s forwards; }
  @keyframes fadeUp { to { opacity:1; transform:none; } }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="icon-wrap">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0e0e0e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div class="card-titles">
      <span class="card-label">Servicio principal</span>
      <h2 class="card-title">Mudanzas Residenciales</h2>
    </div>
  </div>

  <p class="card-desc">
    Nos encargamos de tu mudanza de hogar con el cuidado que mereces. 
    Trasladamos tus pertenencias de forma segura, puntual y sin complicaciones.
  </p>

  <div class="features">
    <span class="feat highlight"><span class="dot"></span> Personal capacitado</span>
    <span class="feat"><span class="dot"></span> Embalaje incluido</span>
    <span class="feat"><span class="dot"></span> Servicio en CDMX</span>
    <span class="feat"><span class="dot"></span> Puntualidad garantizada</span>
    <span class="feat"><span class="dot"></span> Manejo cuidadoso</span>
    <span class="feat"><span class="dot"></span> Sin costo oculto</span>
  </div>
  <!-- Boton Cotizar
  <div class="card-footer">
    <span class="footer-note">Cotización sin costo</span>
    <a href="https://demo.mudanzas.website/contacto/RoVZvp4w" class="btn-quote">
      Cotizar ahora
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    </a>
  </div> -->
</div>
</body>
</html>
