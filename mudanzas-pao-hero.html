<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent;
    font-family: 'Inter', sans-serif;
    height: 100%;
    overflow: hidden;
  }

  .hero-text {
    padding: 24px 0 0 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  h1 {
    font-size: clamp(1.8em, 4vw, 3em);
    font-weight: 900;
    color: #ffffff;
    text-shadow: 2px 2px 16px rgba(0,0,0,0.85), 0 0 40px rgba(0,0,0,0.5);
    line-height: 1.1;
    letter-spacing: -0.5px;
  }

  .tagline {
    font-size: clamp(1em, 2vw, 1.25em);
    font-weight: 700;
    color: #FFD700;
    text-shadow: 1px 1px 8px rgba(0,0,0,0.9);
    letter-spacing: 0.3px;
  }

  .descripcion {
    font-size: clamp(0.85em, 1.5vw, 1em);
    font-weight: 400;
    color: #f0f0f0;
    text-shadow: 1px 1px 6px rgba(0,0,0,0.9);
    max-width: 480px;
    line-height: 1.5;
  }

  .badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .badge {
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,215,0,0.6);
    color: #FFD700;
    font-size: 0.78em;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
  <div class="hero-text">
    <h1>Mudanzas en CDMX</h1>
    <p class="tagline">Rápidas, Seguras y con Garantía</p>
    <p class="descripcion">Confía en Mudanzas Pao para transportar tus bienes con cuidado y puntualidad.</p>
    <div class="badges">
      <span class="badge">✓ Seguro incluido</span>
      <span class="badge">✓ Personal capacitado</span>
      <span class="badge">✓ Cotización gratis</span>
    </div>
  </div>
</body>
</html>
